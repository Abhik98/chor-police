<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chor Police Multiplayer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <header>
            <h1>👮 Chor Police 🏃‍♂️</h1>
            <div class="controls">
                <button id="sound-toggle">🔊 Sound On</button>
            </div>
        </header>

        <div id="lobby-screen" class="screen active">
            <h2>Welcome!</h2>
            <input type="text" id="player-name" placeholder="Enter your name..." maxlength="12">
            <button id="join-btn">Join Game Room</button>
        </div>

        <div id="game-screen" class="screen">
            <div id="dialogue-box">Waiting for players...</div>
            
            <div id="card-table">
                </div>

            <div id="scoreboard">
                <h3>Players</h3>
                <ul id="player-list">
                    </ul>
            </div>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
